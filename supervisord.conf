[supervisord]
nodaemon=true

# INFO: virtual display
[program:xvfb]
command=Xvfb :0 -screen 0 1366x768x24
autorestart=true

# INFO: xfce session
[program:xfce]
command=startxfce4
environment=DISPLAY=:0
autorestart=true

# INFO: vnc server
[program:x11vnc]
command=x11vnc -display :0 -nopw -forever -shared
autorestart=true

# INFO: novnc web
[program:novnc]
command=/opt/novnc/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autorestart=true